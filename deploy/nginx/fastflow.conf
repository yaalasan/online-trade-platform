# Fastflow nginx reverse proxy.
# Copy to /etc/nginx/sites-available/fastflow.conf and symlink into sites-enabled.
# These are plain HTTP (port 80) blocks; `certbot --nginx` rewrites them to add
# the :443 TLS server blocks and the HTTP->HTTPS redirect automatically.

# --- Public marketplace (Flask via gunicorn on 127.0.0.1:5000) ---
server {
    listen 80;
    listen [::]:80;
    server_name fastflow.global www.fastflow.global;

    # Contact/quote payloads are tiny; keep a small cap.
    client_max_body_size 4M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# --- Supplier portal (Next.js on 127.0.0.1:3000) ---
server {
    listen 80;
    listen [::]:80;
    server_name portal.fastflow.global;

    # Factory photos / certificate uploads go through a server action (8 MB cap).
    client_max_body_size 12M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
